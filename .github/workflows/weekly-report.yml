name: Weekly static radar report

on:
  workflow_dispatch:
    inputs:
      data_mode:
        description: "Use deterministic sample data or attempt live public data."
        required: true
        default: live
        type: choice
        options:
          - sample
          - live
  schedule:
    - cron: "15 7 * * 6"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static report
    runs-on: ubuntu-latest
    outputs:
      pages_artifact_id: ${{ steps.upload-pages-artifact.outputs.artifact-id }}
    env:
      DATA_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.data_mode || 'live' }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
    steps:
      - name: Checkout
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          GIT_TERMINAL_PROMPT=0 git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Download previous public report state
        run: |
          set -euo pipefail
          previous_url="${CYCLE_RADAR_PREVIOUS_STATE_URL:-}"
          if [ -z "$previous_url" ]; then
            owner="${GITHUB_REPOSITORY_OWNER}"
            repo="${GITHUB_REPOSITORY#*/}"
            if [ "$repo" = "${owner}.github.io" ]; then
              previous_url="https://${owner}.github.io/data/report_state.json"
            else
              previous_url="https://${owner}.github.io/${repo}/data/report_state.json"
            fi
          fi
          echo "Trying previous report state at ${previous_url}"
          previous_base="${previous_url%/data/report_state.json}"
          echo "${previous_base}" > previous_base_url.txt
          curl --fail --silent --show-error --location --max-time 20 "$previous_url" --output previous_report_state.json || rm -f previous_report_state.json
          curl --fail --silent --show-error --location --max-time 20 "${previous_base}/data/archive.json" --output previous_archive.json || rm -f previous_archive.json
          if [ -s previous_archive.json ]; then
            mkdir -p exports/site/reports
            python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path
          from urllib.parse import quote

          archive = json.loads(Path("previous_archive.json").read_text(encoding="utf-8"))
          base_url = Path("previous_base_url.txt").read_text(encoding="utf-8").strip()
          for item in archive[:60]:
              filename = str(item.get("file", ""))
              if not re.fullmatch(r"[0-9]{4}-[0-9]{2}-[0-9]{2}\.html", filename):
                  continue
              target = Path("exports/site/reports") / filename
              url = f"{base_url}/reports/{quote(filename)}"
              subprocess.run(
                  ["curl", "--fail", "--silent", "--show-error", "--location", "--max-time", "20", url, "--output", str(target)],
                  check=False,
              )
          PY
          fi
        env:
          CYCLE_RADAR_PREVIOUS_STATE_URL: ${{ vars.CYCLE_RADAR_PREVIOUS_STATE_URL }}

      - name: Build static site
        run: |
          set -euo pipefail
          args=()
          if [ "$DATA_MODE" = "sample" ]; then
            args+=(--sample)
          else
            python -m cycle_screener.refresh
            args+=(--fail-on-numeric-sample-fallback)
          fi
          if [ -s previous_report_state.json ]; then
            args+=(--previous previous_report_state.json)
          fi
          if [ -s previous_archive.json ]; then
            args+=(--previous-archive previous_archive.json)
          fi
          python -m cycle_screener.build_static_site "${args[@]}"

      - name: Check public site artifact contents
        run: |
          set -euo pipefail
          test -f exports/site/index.html
          test -f exports/site/data/latest.json
          test -f exports/site/data/report_state.json
          test -f exports/site/data/archive.json
          python -m cycle_screener.static_site_qa exports/site
          if find exports/site -type f \( -name "*.duckdb" -o -name "*.sqlite" -o -name ".env" \) | grep -q .; then
            echo "Blocked private or database artifact inside exports/site"
            exit 1
          fi

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-radar-site
          path: exports/site
          retention-days: 14

      - name: Package GitHub Pages artifact
        run: |
          set -euo pipefail
          tar --dereference --hard-dereference --directory exports/site -cvf "$RUNNER_TEMP/github-pages.tar" .

      - name: Upload GitHub Pages artifact
        id: upload-pages-artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact
        id: deployment
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC token request environment is not available."
            exit 1
          fi
          oidc_response=$(curl --fail --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/${GITHUB_REPOSITORY}")
          oidc_token=$(OIDC_RESPONSE="$oidc_response" python - <<'PY'
          import json
          import os
          print(json.loads(os.environ["OIDC_RESPONSE"])["value"])
          PY
          )
          deploy_payload=$(ARTIFACT_ID="${PAGES_ARTIFACT_ID}" OIDC_TOKEN="$oidc_token" python - <<'PY'
          import json
          import os
          print(json.dumps({
              "artifact_id": int(os.environ["ARTIFACT_ID"]),
              "environment": "github-pages",
              "pages_build_version": os.environ["GITHUB_SHA"],
              "oidc_token": os.environ["OIDC_TOKEN"],
          }))
          PY
          )
          http_status=$(curl --silent --show-error --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --header "Content-Type: application/json" \
            --output pages_deployment.json \
            --write-out "%{http_code}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/deployments" \
            --data "$deploy_payload")
          if [ "$http_status" != "200" ]; then
            echo "Pages deployment API returned HTTP ${http_status}"
            cat pages_deployment.json
            exit 1
          fi
          page_url=$(python - <<'PY'
          import json
          from pathlib import Path
          response = json.loads(Path("pages_deployment.json").read_text(encoding="utf-8"))
          url = str(response.get("page_url", ""))
          if url and not url.startswith(("http://", "https://")):
              url = "https://" + url
          print(url)
          PY
          )
          echo "page_url=${page_url}" >> "$GITHUB_OUTPUT"
          status_url=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("pages_deployment.json").read_text(encoding="utf-8"))["status_url"])
          PY
          )
          for _ in $(seq 1 60); do
            curl --fail --silent --show-error \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GITHUB_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$status_url" --output pages_deployment_status.json
            deployment_status=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("pages_deployment_status.json").read_text(encoding="utf-8")).get("status", "unknown"))
          PY
          )
            echo "Pages deployment status: ${deployment_status}"
            if [ "$deployment_status" = "succeed" ]; then
              exit 0
            fi
            if [ "$deployment_status" = "failed" ] || [ "$deployment_status" = "errored" ]; then
              cat pages_deployment_status.json
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for Pages deployment."
          cat pages_deployment_status.json
          exit 1
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_ARTIFACT_ID: ${{ needs.build.outputs.pages_artifact_id }}
